<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Iframe Sample</title>
</head>
<body>
    <h1>Iframe: Map Embedding</h1>
    <p>This page demonstrates how to embed external content using the modern iframe tag.</p>
    <hr>
    <h2>1. Embedding a website</h2>
    <iframe src="https://www.wikipedia.org/" title="Wikipedia Main Page" width="80%" height="400px"></iframe>
    <hr>
    <h2>2. Embedding a Google Map</h2>
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3721.2185885564993!2d79.0538965759367!3d21.1437!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bd4c05295182301%3A0xe9ef175a3b5a0cf!2sS.%20B.%20Jain%20Institute%20of%20Technology%2C%20Management%20and%20Research!5e0!3m2!1sen!2sin!4v1715000000000!5m2!1sen!2sin" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" title="Location of SB Institute"></iframe>
</body>
</html>
